<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to My Portfolio</h1>
        <p id="details">Loading my info...</p>
    </div>

    <script>
        // This part talks to your server to get info
        fetch('/data')
            .then(response => response.json())
            .then(data => {
                document.getElementById('details').innerText = data.message;
            });
    </script>
</body>
</html>

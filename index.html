<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shamwoon Saad | Portfolio</title>
    <style>
        :root { --primary: #0070f3; --dark: #111; --text: #444; }
        body { font-family: 'Segoe UI', sans-serif; background: #fafafa; color: var(--text); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 500px; padding: 40px; border-radius: 2px; border: 1px solid #eaeaea; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
        .view-badge { position: absolute; top: 20px; right: 20px; background: #f0f0f0; padding: 4px 10px; font-size: 0.7rem; font-weight: 600; border-radius: 20px; }
        .profile-pic { width: 100px; height: 100px; filter: grayscale(100%); transition: 0.3s; border: 1px solid #eee; margin-bottom: 20px; object-fit: cover; }
        .profile-pic:hover { filter: grayscale(0%); border-color: var(--primary); }
        h1 { font-size: 1.5rem; font-weight: 700; color: var(--dark); letter-spacing: -0.5px; margin: 0; }
        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-top: 25px; display: block; font-weight: 600; }
        p { font-size: 0.95rem; line-height: 1.6; margin: 5px 0 0; }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn { font-size: 0.8rem; font-weight: 600; text-decoration: none; color: var(--dark); border: 1px solid var(--dark); padding: 8px 16px; transition: 0.2s; }
        .btn:hover { background: var(--dark); color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div class="view-badge">DB Views: <span id="viewCount">0</span></div>
        <img src="photo.jpg" alt="Profile" class="profile-pic">
        <h1 id="userName">Loading...</h1>
        
        <span class="label">Expertise</span>
        <p id="userSkills"></p>

        <span class="label">Education & Awards</span>
        <p id="userAchieve"></p>

        <span class="label">Athletics</span>
        <p id="userSports"></p>

        <div class="footer">
            <a id="userLink" href="#" class="btn">LINKEDIN</a>
            <span id="userPhone" style="font-size: 0.8rem; font-weight: 600;"></span>
        </div>
    </div>

    <script>
        fetch('/api/data')
            .then(res => res.json())
            .then(data => {
                document.getElementById('userName').innerText = data.name;
                document.getElementById('userSkills').innerText = data.skills;
                document.getElementById('userAchieve').innerText = data.achievements;
                document.getElementById('userSports').innerText = data.sports;
                document.getElementById('userPhone').innerText = data.phone;
                document.getElementById('userLink').href = data.linkedin;
                document.getElementById('viewCount').innerText = data.views;
            });
    </script>
</body>
</html>
